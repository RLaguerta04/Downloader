html, body, #root { height: 100%; }
body { margin: 0; font-family: 'Roboto', system-ui, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; background: #e6e6e6; color: #1d1d1d; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 9999px; border: 3px solid transparent; background-clip: content-box; }
*::-webkit-scrollbar-thumb:hover { background: #b8b8b8; background-clip: content-box; }
*::-webkit-scrollbar-track { background: transparent; }
.sbar { border: 1px solid #e6e6e6; background: #ffffff; color: #333333; }
.sbar__div { border-left: 1px solid #cccccc; }
.sbar__btn { color: #333333; transition: color 0.15s; }
.sbar__btn:hover { color: #f45513; }
.sbar__in { background: transparent; color: #1d1d1d; letter-spacing: 0.1px; }
.sbar__in::placeholder { color: #d0d0d0; }
.rowtip { position: fixed; z-index: 60; display: none; min-width: 150px; max-width: 240px; padding: 8px 10px; border: 1px solid #e6e6e6; border-radius: 8px; background: #ffffff; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12); font-size: 11px; line-height: 1.4; color: #1d1d1d; pointer-events: none; }
.rowtip .tip-title { font-weight: 600; margin-bottom: 6px; max-width: 220px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.rowtip dl { margin: 0; display: flex; flex-direction: column; gap: 2px; }
.rowtip .tip-row { display: flex; justify-content: space-between; gap: 14px; }
.rowtip dt { color: #808080; }
.rowtip dd { margin: 0; color: #272727; font-weight: 500; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.rowtip .tip-dot { width: 6px; height: 6px; border-radius: 9999px; }
div#tabbar { margin: 0px 8px; border-radius: 6px; }

/* AI assistant (docked side panel) */
.chat { position: relative; flex-shrink: 0; width: 0; opacity: 0; overflow: hidden; transition: width .24s cubic-bezier(.4, 0, .2, 1), opacity .2s ease; }
.chat.is-open { width: 360px; opacity: 1; }
.chat__inner { position: absolute; top: 0; right: 0; bottom: 0; width: 360px; display: flex; flex-direction: column; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
.chat__foot.is-confirm .chat__inputwrap { opacity: .55; }
.chat__foot.is-confirm .chat__send { pointer-events: none; opacity: .5; }
.chat__send[disabled] { opacity: .4; pointer-events: none; }
.asst-btn { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 12px; border-radius: 6px; background: #f45513; color: #fff; font-size: 12px; font-weight: 500; transition: background .15s; }
.asst-btn:hover { background: #dd4a0f; }
.asst-btn[aria-pressed="true"] { background: #c8420d; box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .1); }
.chat__results { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.chat__card { display: flex; align-items: center; gap: 8px; padding: 6px; border: 1px solid #e4e4e7; border-radius: 8px; background: #fff; }
.chat__thumb { position: relative; width: 50px; height: 34px; border-radius: 5px; flex-shrink: 0; overflow: hidden; }
.chat__cardbody { min-width: 0; flex: 1; }
.chat__cardtitle { font-size: 11px; font-weight: 500; color: #1d1d1d; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.chat__cardmeta { font-size: 10px; color: #808080; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat__srcdot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }
.chat__add { flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 6px; background: #fef9f4; color: #f45513; cursor: pointer; transition: all .15s; }
.chat__add:hover { background: #f45513; color: #fff; }
.chat__add[disabled] { opacity: .5; pointer-events: none; }
@keyframes chatIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.chat-in { animation: chatIn .2s ease both; }
.chat__dots { display: inline-flex; gap: 3px; margin-left: 6px; vertical-align: middle; }
.chat__dots i { width: 5px; height: 5px; border-radius: 50%; background: #808080; animation: chatDot 1s infinite ease-in-out; }
.chat__dots i:nth-child(2) { animation-delay: .15s; }
.chat__dots i:nth-child(3) { animation-delay: .3s; }
@keyframes chatDot { 0%, 100% { opacity: .3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-2px); } }
.chat__add--done { background: #e8f9ee; color: #34c759; cursor: default; }
.chat__card--added { opacity: .55; }
/* link preview card (paste a URL) */
.chat__linkcard .chat__thumb { width: 72px; height: 44px; overflow: hidden; }
.chat__thumbimg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.chat__thumbplay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; z-index: 2; filter: drop-shadow(0 1px 2px rgba(0, 0, 0, .45)); }
.chat__thumbbadge { position: absolute; left: 3px; top: 3px; z-index: 3; font-size: 8px; font-weight: 700; letter-spacing: .02em; color: #fff; background: rgba(0, 0, 0, .55); padding: 1px 4px; border-radius: 3px; }
.chat__linkactions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.chat__linkdone { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; color: #34c759; padding: 5px 4px; }
.chat__spin { width: 13px; height: 13px; border: 2px solid rgba(244, 85, 19, .25); border-top-color: #f45513; border-radius: 50%; animation: spin .6s linear infinite; }
/* activity tracker (Claude-Code style step log) */
.act { margin-top: 2px; }
.act__head { display: flex; align-items: center; gap: 7px; width: 100%; padding: 6px 8px; border: 1px solid #e4e4e7; background: #fafafa; cursor: pointer; font-size: 11px; color: #272727; border-radius: 8px; }
.act:not(.is-collapsed) .act__head { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
.act__title { flex: 1; text-align: left; font-weight: 500; }
.act__chev { color: #b0b0b0; display: inline-flex; transition: transform .15s; }
.act.is-collapsed .act__chev { transform: rotate(-90deg); }
.act__ok { color: #34c759; display: inline-flex; }
.act__term { border: 1px solid #e4e4e7; border-top: 0; border-radius: 0 0 8px 8px; background: #23232b; padding: 8px 9px; display: flex; flex-direction: column; gap: 5px; overflow-x: auto; }
.act.is-collapsed .act__term { display: none; }
.act__line { display: flex; align-items: center; gap: 7px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 10.5px; line-height: 1.4; color: #d7d7de; white-space: nowrap; }
.act__cmd .p { color: #7ee787; }
.act__spin { width: 11px; height: 11px; border: 2px solid rgba(255, 255, 255, .3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes rowIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
@keyframes rowHi { from { background: #fef9f4; } to { background: transparent; } }
.row-in { animation: rowIn .28s ease both, rowHi 1.2s ease .1s; }
/* table column layout — collapses to essentials when the assistant is open */
.dt-wrap { min-width: 1000px; }
.dtrow { display: grid; grid-template-columns: minmax(280px, 1fr) 88px 72px 92px 92px 116px 104px 72px 64px; }
.dt-wrap.compact { min-width: 0; }
.dt-wrap.compact .dtrow { grid-template-columns: minmax(180px, 1fr) 84px 84px 96px 60px; }
.dt-wrap.compact .col-hide { display: none; }
/* detached chat */
.chat__inner--float { position: static; width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
/* in-app draggable floating panel (no browser chrome) */
.chat-float { position: fixed; top: 76px; right: 40px; width: 360px; height: 560px; max-height: calc(100vh - 96px); z-index: 60; border-radius: 12px; box-shadow: 0 14px 44px rgba(0, 0, 0, .22); overflow: hidden; background: #fff; }
.chat__inner--panel { position: static; width: 100%; height: 100%; border-radius: 12px; box-shadow: none; }
.chat-float .chat__head { cursor: move; }
.chat-detached { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 24px; text-align: center; background: #fff; border-radius: 8px; }
.chat-detached__t { font-size: 12px; color: #5b5b5b; max-width: 220px; line-height: 1.5; }
.chat-detached__btn { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 6px; background: #f45513; color: #fff; cursor: pointer; }
.chat-detached__btn:hover { background: #dd4a0f; }
.chat__head { display: flex; align-items: center; gap: 8px; height: 48px; flex-shrink: 0; padding: 0 10px 0 12px; border-bottom: 1px solid #f3f3f3; }
.chat__title { font-weight: 600; font-size: 13px; color: #1d1d1d; line-height: 1.2; }
.chat__sub { font-size: 10px; color: #808080; line-height: 1.3; }
.chat__log { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 12px; }
.chat__msg { max-width: 86%; padding: 7px 10px; border-radius: 12px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.chat__msg--user { align-self: flex-end; background: #f45513; color: #ffffff; border-bottom-right-radius: 4px; }
.chat__msg--bot { align-self: flex-start; background: #f2f2f2; color: #1d1d1d; border-bottom-left-radius: 4px; }
.chat__row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.chat__chip { font-size: 11px; padding: 4px 9px; border: 1px solid #e4e4e7; border-radius: 9999px; background: #fff; color: #272727; cursor: pointer; transition: all .15s; }
.chat__chip:hover { border-color: #f45513; color: #f45513; }
/* welcome / empty state (shown when the conversation is empty) */
.chat__welcome { flex: 1; display: flex; flex-direction: column; width: 100%; padding: 4px 2px 2px; }
.chat__welcomehead { margin-top: auto; align-self: center; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 5px; max-width: 300px; }

      /* ---------- CSV export (all rows incl. queued child videos) ---------- */
      function exportCSV() {
        const header = ['Title', 'Channel', 'Type', 'Size', 'Format', 'Status', 'Date Added', 'Caption', 'Source'];
        const statusLabel = { fetching: 'Fetching metadata', ready: 'Ready', active: 'Active', paused: 'Paused', initializing: 'Initializing', failed: 'Failed', finished: 'Finished' };
        const src = { youtube: 'YouTube', web: 'Web' };
        const rows = [];
        downloads.forEach((item) => {
          rows.push([item.title, item.expandable ? item.title : item.subtitle, item.expandable ? 'Channel' : 'Video', item.size, item.format, statusLabel[item.status] || item.status, item.dateAdded, item.caption ? 'Yes' : 'No', src[item.source] || item.source]);
          (item.children || []).forEach((c) => {
            rows.push([c.title, item.title, 'Video', c.size, '', 'Queued', c.dateAdded, 'No', src[c.source] || c.source]);
          });
        });
        const q = (v) => { const s = String(v == null ? '' : v); return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
        const csv = [header, ...rows].map((r) => r.map(q).join(',')).join('\r\n');
        // Leading BOM so Excel reads UTF-8 (× and curly quotes) correctly.
        const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
        const a = Object.assign(document.createElement('a'), {
          href: URL.createObjectURL(blob),
          download: `downlodr-export-${new Date().toISOString().slice(0, 10)}.csv`,
        });
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);
      }

      const statusItemClass = (sel) =>

      function sidebar() {

      function tableHeader() {
        const cells = COLUMNS.map((col, i) => {
          if (i === 0) {
            return `<div class="flex h-8 items-center gap-1"><span class="mr-3 flex items-center">${checkbox('__all')}</span><span>${col}</span>${li('chevrons-up-down', 'w-[11px] h-[11px] text-mono-300')}<span id="viewcount" class="ml-auto pr-3 font-normal normal-case text-mono-300">Viewing 1–10 of 17</span></div>`;
          }
          return `<div class="flex h-8 items-center justify-center gap-1 ${[4, 5, 6, 7].includes(i) ? 'col-hide' : ''}"><span>${col}</span>${li('chevrons-up-down', 'w-[11px] h-[11px] text-mono-300')}</div>`;
        }).join('');
        return `<div class="sticky top-0 z-10 dtrow items-center border-b border-stroke bg-white px-3 text-2xs font-medium text-mono-500">${cells}</div>`;
      }

      const pagination = () =>
        `<div class="flex h-9 shrink-0 items-center justify-center gap-3 border-t border-line bg-white text-2xs text-mono-500">
          <button data-page="prev" class="flex h-6 w-6 items-center justify-center rounded text-ink-700 transition-colors hover:bg-mono-100" title="Previous page">${li('chevron-left', 'w-[14px] h-[14px]')}</button>
          <span id="pglabel">Page 1 of 2</span>
          <button data-page="next" class="flex h-6 w-6 items-center justify-center rounded text-ink-700 transition-colors hover:bg-mono-100" title="Next page">${li('chevron-right', 'w-[14px] h-[14px]')}</button>
        </div>`;

      const statusBar = () =>
        `<div class="flex h-9 shrink-0 items-center gap-4 rounded-lg bg-white px-3 text-2xs text-mono-500 shadow-sm">
          <button class="flex h-6 w-6 items-center justify-center rounded text-ink-400 transition-colors hover:bg-mono-100 hover:text-ink-700" title="Toggle panel">${li('chevron-down', 'w-[14px] h-[14px]')}</button>
          <span class="flex items-center gap-1.5"><span class="h-1.5 w-1.5 rounded-full bg-green-500"></span>6 finished</span>
          <span class="flex items-center gap-1.5"><span class="h-1.5 w-1.5 rounded-full bg-mono-300"></span>9 queued</span>
          <span class="flex items-center gap-1.5"><span class="h-1.5 w-1.5 rounded-full bg-red-500"></span>2 failed</span>
          <span class="flex items-center gap-1.5 text-ink-700">${li('download', 'w-[13px] h-[13px] text-mono-500')}<span class="font-medium">0 MB/s</span></span>
          <span class="ml-1 font-medium text-ink-700">Progress</span>
          <div class="h-1.5 flex-1 overflow-hidden rounded-full bg-mono-100"><div class="h-full w-[2%] rounded-full bg-orange"></div></div>
          <span class="font-medium text-ink-700">0%</span>
        </div>`;

      /* =====================================================================
         Action layer + natural-language assistant (offline, rule-based)
         ===================================================================== */
      const STATUS_WORDS = {
        all: ['all', 'everything'],
        fetching: ['fetching', 'metadata'],
        start: ['start download'],
        queued: ['queued', 'queue'],
        downloading: ['downloading', 'active', 'in progress'],
        paused: ['paused'],
        initializing: ['initializing'],
        failed: ['failed', 'error', 'errored'],
        finished: ['finished', 'completed', 'complete', 'done'],
        favorites: ['favorites', 'favourites', 'favorited', 'liked', 'hearted'],
        subscriptions: ['subscriptions', 'subscription', 'channels'],
        articles: ['articles', 'article'],
      };
      const STATUS_LABELS = { all: 'All', fetching: 'Fetching Metadata', start: 'Start Download', queued: 'Queued', downloading: 'Downloading', paused: 'Paused', initializing: 'Initializing', failed: 'Failed', finished: 'Finished', favorites: 'Favorites', subscriptions: 'Subscriptions', articles: 'Articles' };
      const statusName = (st) => STATUS_LABELS[st] || st;
      const effStatus = (item) => statusOverride[item.id] || item.status;

      function matchesStatus(item, st) {
        if (st === 'all') return true;
        if (st === 'favorites') return favorites.has(item.id);
        if (st === 'subscriptions') return !!item.expandable;
        if (st === 'articles') return item.source === 'web';
        const e = effStatus(item);
        if (st === 'downloading' || st === 'start') return e === 'active';
        if (st === 'queued') return !!(item.children && item.children.length);
        return e === st;
      }
      const hay = (item) => (item.title + ' ' + (item.subtitle || '')).toLowerCase();
      function visibleItems() {
        const q = query.trim().toLowerCase();
        return downloads
          .filter((d) => !removed.has(d.id))
          .filter((d) => matchesStatus(d, activeStatus))
          .filter((d) => !q || hay(d).includes(q) || (d.children || []).some((c) => c.title.toLowerCase().includes(q)));
      }
      function pagedItems() {
        const all = visibleItems();
        const pages = Math.max(1, Math.ceil(all.length / PAGE_SIZE));
        if (currentPage > pages) currentPage = pages;
        if (currentPage < 1) currentPage = 1;
        const start = (currentPage - 1) * PAGE_SIZE;
        return { rows: all.slice(start, start + PAGE_SIZE), total: all.length, pages, start };
      }
      function matchByQuery(q) {
        const s = (q || '').trim().toLowerCase();
        if (!s) return [];
        return downloads.filter((d) => !removed.has(d.id) && (hay(d).includes(s) || (d.children || []).some((c) => c.title.toLowerCase().includes(s))));
      }

      function syncSidebar() {
        const a = document.getElementById('sidebar');
        if (a) a.querySelectorAll('[data-status]').forEach((x) => (x.className = statusItemClass(x.dataset.status === activeStatus)));
      }
      function syncTabs() {
        const t = document.getElementById('tabbar');
        if (t) t.querySelectorAll('[data-tab]').forEach((x) => (x.className = tabClass(x.dataset.tab === activeTab)));
      }
      function updateChrome() {
        const p = pagedItems();
        const vc = document.getElementById('viewcount');
        if (vc) vc.textContent = p.total ? `Viewing ${p.start + 1}–${p.start + p.rows.length} of ${p.total}` : 'No results';
        const pl = document.getElementById('pglabel');
        if (pl) pl.textContent = `Page ${currentPage} of ${p.pages}`;
        syncSidebar();
        syncTabs();
      }

      const matchStatusWord = (t) => {
        for (const [id, words] of Object.entries(STATUS_WORDS)) if (words.some((w) => t.includes(w))) return id;
        return null;
      };
      function resolveTargets(t) {
        if (/\b(selected|checked|my selection|these|them)\b/.test(t)) return { items: downloads.filter((d) => checked.has(d.id) && !removed.has(d.id)), desc: 'selected item(s)' };
        if (/\b(all|everything)\b/.test(t)) return { items: visibleItems(), desc: 'item(s)' };
        const st = matchStatusWord(t);
        if (st) return { items: downloads.filter((d) => !removed.has(d.id) && matchesStatus(d, st)), desc: statusName(st).toLowerCase() + ' item(s)' };
        return null;
      }
      function extractAfter(t, reSource) {
        const m = t.match(new RegExp(reSource + '\\s+(.+)$'));
        if (!m) return '';
        return m[1].replace(/^(for|about|the|all|me|to)\s+/, '').replace(/[?.,"']/g, '').replace(/\b(videos?|downloads?|channel|items?)\b/g, '').replace(/\s+/g, ' ').trim();
      }

      /* ---- the whitelisted action layer (used by UI + assistant) ---- */
      const actions = {
        search(q) { query = (q || '').trim(); currentPage = 1; refreshTable(); return query ? `Showing results for “${query}” — ${visibleItems().length} item(s).` : 'Cleared the search.'; },
        filter(st) { activeStatus = st; currentPage = 1; refreshTable(); return `Filtered to ${statusName(st)} — ${visibleItems().length} item(s).`; },
        tab(name) { activeTab = name; syncTabs(); return `Opened the ${name} tab.`; },
        page(n) { const p = pagedItems(); currentPage = Math.min(Math.max(1, n), p.pages); refreshTable(); return `Showing page ${currentPage} of ${p.pages}.`; },
        nextPage() { return actions.page(currentPage + 1); },
        prevPage() { return actions.page(currentPage - 1); },
        select(items, desc) { items.forEach((d) => checked.add(d.id)); refreshTable(); return items.length ? `Selected ${items.length} ${desc} — ${checked.size} selected in total.` : 'Nothing to select.'; },
        clearSelection() { const n = checked.size; checked.clear(); refreshTable(); return n ? `Cleared ${n} selection(s).` : 'Nothing was selected.'; },
        del(items, desc) { const ids = items.map((d) => d.id); if (!ids.length) return 'Nothing to delete.'; ids.forEach((id) => { removed.add(id); checked.delete(id); }); lastDeleted = ids; refreshTable(); return `Deleted ${ids.length} ${desc}. Say “undo” to restore.`; },
        undo() { if (!lastDeleted.length) return 'Nothing to undo.'; lastDeleted.forEach((id) => removed.delete(id)); const n = lastDeleted.length; lastDeleted = []; refreshTable(); return `Restored ${n} item(s).`; },
        setStatus(items, st, verb) { items.forEach((d) => (statusOverride[d.id] = st)); refreshTable(); return items.length ? `${verb} ${items.length} item(s).` : `Nothing to ${verb.toLowerCase()}.`; },
        favorite(items, on) { items.forEach((d) => (on ? favorites.add(d.id) : favorites.delete(d.id))); refreshTable(); return items.length ? `${on ? 'Added' : 'Removed'} ${items.length} item(s) ${on ? 'to' : 'from'} favorites.` : 'No matching item.'; },
        expand(item) { expanded.add(item.id); refreshTable(); return `Expanded ${item.title}.`; },
        collapseAll() { expanded.clear(); refreshTable(); return 'Collapsed all channels.'; },
        expandAll() { downloads.forEach((d) => d.children && expanded.add(d.id)); refreshTable(); return 'Expanded all channels.'; },
        info(st) { const items = downloads.filter((d) => !removed.has(d.id) && (st ? matchesStatus(d, st) : true)); return st ? `There ${items.length === 1 ? 'is' : 'are'} ${items.length} ${statusName(st).toLowerCase()} item(s).` : `There are ${items.length} downloads in total.`; },
      };

      const HELP_CHIPS = ['Find videos about lofi beats', 'Show subscriptions', 'Select all', 'Delete selected', 'Expand Sasquatch', 'How many downloads?'];
      const helpText = () =>
        'Here’s what I can do:\n• Find on the web — “find videos about lofi beats”, then Add to queue\n• Search list — “search gamedev”\n• Filter — “show subscriptions”, “downloading”\n• Navigate — “open plugins tab”, “next page”\n• Select — “select all”, “select subscriptions”\n• Delete — “delete selected” (I’ll confirm first)\n• Control — “pause all”, “start downloads”\n• Favorite — “favorite the Gabriela video”\n• Expand — “expand Sasquatch”, “collapse all”\n• Info — “how many downloads?”';

      function interpret(raw) {
        const t = raw.toLowerCase().trim();
        if (!t) return { reply: 'Type a command, e.g. “show subscriptions” or “select all and delete”.' };
        if (/^(undo|restore)\b/.test(t)) return { run: () => actions.undo() };
        if (/\b(help|what can you|what can i|commands|how do i)\b/.test(t)) return { reply: helpText(), chips: HELP_CHIPS };
        if (/\bhow many\b|\bnumber of\b|\bcount\b/.test(t)) return { run: () => actions.info(matchStatusWord(t)) };

        if (/\bplugins?\b/.test(t) && /\btab\b|open/.test(t)) return { run: () => actions.tab('Plugins') };
        if (/\bdownloads? tab\b/.test(t)) return { run: () => actions.tab('Downloads') };

        if (/\bnext page\b/.test(t)) return { run: () => actions.nextPage() };
        if (/\b(previous|prev|back) page\b/.test(t)) return { run: () => actions.prevPage() };
        const pg = t.match(/\bpage\s+(\d+)\b/);
        if (pg) return { run: () => actions.page(+pg[1]) };

        if (/\b(deselect|unselect|clear selection|uncheck all|clear my selection)\b/.test(t)) return { run: () => actions.clearSelection() };
        if (/\b(select|check|tick|highlight)\b/.test(t)) {
          const tgt = resolveTargets(t);
          if (tgt) return { run: () => actions.select(tgt.items, tgt.desc) };
          const q = extractAfter(t, '(?:select|check|tick|highlight)');
          if (q) { const m = matchByQuery(q); return { run: () => actions.select(m, `item(s) matching “${q}”`) }; }
          return { run: () => actions.select(visibleItems(), 'item(s)') };
        }

        if (/\b(delete|remove|trash|discard)\b/.test(t) || (/\bclear\b/.test(t) && !/clear selection/.test(t))) {
          let tgt = resolveTargets(t), q = null;
          if (!tgt) { q = extractAfter(t, '(?:delete|remove|trash|discard|clear)'); if (q) tgt = { items: matchByQuery(q), desc: `item(s) matching “${q}”` }; }
          if (!tgt || !tgt.items.length) return { reply: q ? `Nothing matches “${q}” to delete.` : 'What should I delete? Try “delete selected” or “delete failed”.' };
          return { confirm: true, reply: `Delete ${tgt.items.length} ${tgt.desc}? You can undo this.`, run: () => actions.del(tgt.items, tgt.desc) };
        }

        if (/\b(start|resume|begin)\b/.test(t)) { const tgt = resolveTargets(t) || { items: visibleItems() }; return { run: () => actions.setStatus(tgt.items, 'active', 'Started') }; }
        if (/\b(pause|hold)\b/.test(t)) { const tgt = resolveTargets(t) || { items: visibleItems() }; return { run: () => actions.setStatus(tgt.items, 'paused', 'Paused') }; }
        if (/\bstop\b/.test(t)) { const tgt = resolveTargets(t) || { items: visibleItems() }; return { run: () => actions.setStatus(tgt.items, 'ready', 'Stopped') }; }

        if (/\b(unfavorite|unlike|remove from favorites)\b/.test(t)) { const q = extractAfter(t, '(?:unfavorite|unlike|favorites)'); const m = q ? matchByQuery(q) : (resolveTargets(t)?.items || []); return { run: () => actions.favorite(m, false) }; }
        if (/\b(favorite|favourite|like|heart)\b/.test(t)) { const q = extractAfter(t, '(?:favorite|favourite|like|heart)'); const m = q ? matchByQuery(q) : (resolveTargets(t)?.items || []); if (!m.length) return { reply: 'Which item should I favorite? Try “favorite the Gabriela video”.' }; return { run: () => actions.favorite(m, true) }; }

        if (/\bexpand all\b/.test(t)) return { run: () => actions.expandAll() };
        if (/\bcollapse\b/.test(t)) return { run: () => actions.collapseAll() };
        if (/\b(expand|open)\b/.test(t)) { const q = extractAfter(t, '(?:expand|open)'); const m = matchByQuery(q).find((d) => d.children); if (m) return { run: () => actions.expand(m) }; }

        // Web video discovery (mock provider behind an adapter — see webSearch)
        if (/\bsearch the web\b|\bfind videos?\b|\blook online\b|\bsearch online\b|\bvideos? about\b|\b(on|from) youtube\b|\bdiscover\b/.test(t)) {
          const q = extractAfter(t, '(?:search the web for|search the web|find videos about|find video about|find videos|find video|look online for|look online|search online for|search online|videos? about|discover|on youtube|from youtube)');
          return { web: q };
        }
        if (/\b(search|find|look for)\b/.test(t)) { const q = extractAfter(t, '(?:search|find|look for)'); const n = q ? matchByQuery(q).filter((d) => matchesStatus(d, activeStatus)).length : 1; return { run: () => actions.search(q), chips: n === 0 ? ['Search the web for ' + q] : undefined }; }
        if (/\bclear search\b/.test(t)) return { run: () => actions.search('') };

        const st = matchStatusWord(t);
        if (st && /\b(show|filter|go to|view|only|see|display|list)\b/.test(t)) return { run: () => actions.filter(st) };
        if (st && t.split(/\s+/).length <= 3) return { run: () => actions.filter(st) };

        if (/\b(dark mode|light mode|theme)\b/.test(t)) return { reply: 'The theme button is visual only right now — dark mode isn’t wired up yet.' };

        return { reply: `I’m not sure how to “${raw}”. I can search, filter, select, delete, start/pause, favorite, expand, and navigate. Try one:`, chips: HELP_CHIPS };
      }

      /* ---- chat controller ---- */
      const chatLog = [];
      let pendingConfirm = null;
      let chatSeeded = false;
      let chatDoc = document; // the document currently hosting the chat (main, or a detached float window)
      let detached = false;
      let floatWin = null;
      let chatInner = null; // the .chat__inner element (relocated when detached, never duplicated)
      let floating = false; // in-app draggable panel mode
      let floatEl = null;

      function welcomeHTML() {
        const chips = HELP_CHIPS.map((c) => `<button class="chat__wchip" data-chip="${esc(c)}">${esc(c)}</button>`).join('');
        return `<div class="chat__welcome"><div class="chat__welcomehead"><div class="chat__welcomeicon">${li('sparkles', 'w-6 h-6')}</div><div class="chat__welcometitle">How can I help?</div><div class="chat__welcomedesc">Ask in plain language — search, filter, download, favorite, and navigate your downloads.</div></div><div class="chat__welcomesug"><div class="chat__welcomelabel">Try one</div><div class="chat__welcomechips">${chips}</div></div></div>`;
      }
      function renderChat() {
        const log = chatDoc.getElementById('chatlog');
        if (!log) return;
        if (!chatLog.length) { log.innerHTML = welcomeHTML(); log.scrollTop = 0; return; }
        log.innerHTML = chatLog
          .map((m, idx) => {
            const cls = m.animated ? '' : 'chat-in';
            if (m.role === 'user') return `<div class="chat__msg chat__msg--user ${cls}">${esc(m.text)}</div>`;
            if (m.activity) return `<div class="${cls}">${activityHTML(m, idx)}</div>`;
            if (m.loading) return `<div class="${cls}"><div class="chat__msg chat__msg--bot">${esc(m.text)}<span class="chat__dots"><i></i><i></i><i></i></span></div></div>`;
            let extra = '';
            if (m.confirm) extra = '<div class="chat__row"><button class="chat__cta chat__cta--go" data-act="go">Confirm</button><button class="chat__cta chat__cta--no" data-act="cancel">Cancel</button></div>';
            else if (m.results) extra = resultsHTML(m.results);
            else if (m.linkId) extra = linkCardHTML(m.linkId);
            else if (m.chips) extra = `<div class="chat__row">${m.chips.map((c) => `<button class="chat__chip" data-chip="${esc(c)}">${esc(c)}</button>`).join('')}</div>`;
            return `<div class="${cls}"><div class="chat__msg chat__msg--bot">${esc(m.text)}</div>${extra}</div>`;
          })

        chatLog.forEach((m) => (m.animated = true));
        log.scrollTop = log.scrollHeight;
      }
      function activityHTML(m, idx) {
        const okSmall = `<span class="act__ok">${li('check', 'w-3 h-3')}</span>`;
        const title = m.done ? `${m.steps.length} step${m.steps.length > 1 ? 's' : ''}` : 'Working…';

          .map((s) => `<div class="act__line">${s.status === 'done' ? okSmall : '<span class="act__spin"></span>'}<span class="act__cmd"><span class="p">$</span> downlodr ${esc(s.cmd)}</span></div>`)
          .join('');
        return `<div class="act${m.collapsed ? ' is-collapsed' : ''}"><button class="act__head" data-acttoggle="${idx}">${m.done ? okSmall : '<span class="chat__spin"></span>'}<span class="act__title">${title}</span><span class="act__chev">${li('chevron-down', 'w-[13px] h-[13px]')}</span></button><div class="act__term">${lines}</div></div>`;
      }
      function pushUser(t) { chatLog.push({ role: 'user', text: t }); renderChat(); }
      function pushBot(t, opts) { chatLog.push(Object.assign({ role: 'bot', text: t }, opts || {})); renderChat(); }
      function confirmPending(ok) {
        if (!pendingConfirm) return;
        const run = pendingConfirm.run;
        pendingConfirm = null;
        setConfirmUI(false);
        pushBot(ok ? run() : 'Okay, cancelled — nothing was changed.');
      }
      function setConfirmUI(on) {
        const foot = chatDoc.getElementById('chatfoot');
        const inp = chatDoc.getElementById('chatinput');
        if (foot) foot.classList.toggle('is-confirm', on);
        if (inp) inp.placeholder = on ? 'Type “yes” / “no”, or use the buttons above' : 'Message the assistant…';
      }
      function clearChat() {
        chatLog.length = 0;
        pendingConfirm = null;
        setConfirmUI(false);
        renderChat();
      }

      /* ---- web video discovery (mock provider behind an adapter boundary) ---- */
      let lastResults = [];
      let webIdCounter = 0;
      const addedResults = new Set();
      const loadingResults = new Set();
      const WEB_CHANNELS = ['Creator Hub', 'HowTo Daily', 'BrightLearn', 'The Studio', 'TechWave', 'MakerSpace', 'Field Notes'];
      const WEB_THUMBS = [['#ff5f8d', '#7a1f3d'], ['#3b6fb5', '#1b2b4d'], ['#2f9e6b', '#11402b'], ['#e0a32e', '#5a3d0a'], ['#6a4bb0', '#2a1850'], ['#c0443a', '#4d1411']];
      // Real YouTube videos used to fill the YouTube slots so their thumbnails are real (img.youtube.com). Other platforms keep gradient placeholders.
      const YT_SAMPLES = [
        { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up (Official Video)', channel: 'Rick Astley', duration: '3:33' },
        { id: '9bZkp7q19f0', title: 'PSY - GANGNAM STYLE (강남스타일) M/V', channel: 'officialpsy', duration: '4:13' },
        { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito ft. Daddy Yankee', channel: 'Luis Fonsi', duration: '4:42' },
        { id: 'OPf0YbXqDm0', title: 'Mark Ronson - Uptown Funk ft. Bruno Mars', channel: 'Mark Ronson', duration: '4:31' },
        { id: 'fJ9rUzIMcZQ', title: 'Queen – Bohemian Rhapsody (Official Video)', channel: 'Queen Official', duration: '5:59' },
        { id: '60ItHLz5WEA', title: 'Alan Walker - Faded', channel: 'Alan Walker', duration: '3:32' },
      ];
      // ADAPTER BOUNDARY — replace this mock with a real provider (web API or a local proxy/yt-dlp). YouTube thumbnails are real (hybrid: img.youtube.com with a gradient fallback offline); other sources are mock.
      function webSearch(query) {
        const q = (query || '').trim();
        if (!q) return [];
        const cap = q.replace(/\b\w/g, (c) => c.toUpperCase());
        const templates = [`${cap} — Full Tutorial`, `${cap} Explained in 10 Minutes`, `Top 10 ${cap} Tips for 2026`, `${cap} for Beginners`, `The Ultimate ${cap} Guide`];
        const srcCycle = ['youtube', 'bilibili', 'twitch', 'vimeo', 'youtube'];
        let ytPick = q.length;
        return templates.map((title, i) => {
          const source = srcCycle[(i + q.length) % srcCycle.length];
          if (source === 'youtube') {
            const v = YT_SAMPLES[(ytPick++) % YT_SAMPLES.length];
            return { id: 'r' + (++webIdCounter), title: v.title, channel: v.channel, duration: v.duration, source: 'youtube', videoId: v.id, thumbUrl: `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`, thumbColor: ['#ff3b30', '#7a1010'] };
          }
          return {
            id: 'r' + (++webIdCounter),
            title,
            channel: WEB_CHANNELS[(i + q.length) % WEB_CHANNELS.length],
            duration: `${4 + ((i * 3 + q.length) % 18)}:${String((i * 17 + 5) % 60).padStart(2, '0')}`,
            source,
            thumbColor: WEB_THUMBS[(i + q.length) % WEB_THUMBS.length],
          };
        });
      }
      function pushLoading(text) { const m = { role: 'bot', loading: true, text }; chatLog.push(m); renderChat(); return m; }
      function removeMsg(m) { const i = chatLog.indexOf(m); if (i >= 0) { chatLog.splice(i, 1); renderChat(); } }
      function runWebSearch(q) {
        if (!q) { pushBot('What should I search the web for? e.g. “find videos about lofi beats”.'); return; }
        const loadingMsg = pushLoading(`Searching the web for “${q}”`);
        setTimeout(() => {
          removeMsg(loadingMsg);
          const results = webSearch(q);
          lastResults = results;
          if (!results.length) { pushBot(`No web results for “${q}”.`); return; }
          pushBot(`Here are web results for “${q}” — tap + to queue one, or “Add all”.`, { results });
        }, 750);
      }
      function queueFromResult(r, format) {
        const id = 'w' + (++webIdCounter);
        downloads.unshift({ id, title: r.title, subtitle: r.channel, thumbColor: r.thumbColor, size: '—', format: format || 'mp4', status: 'fetching', speed: [], dateAdded: 'just now', caption: false, source: r.source, _new: true });
        tipIndex[id] = { title: r.title, statusKey: 'fetching', source: r.source, caption: false, speed: [], date: 'just now' };
        return id;
      }
      function showQueued() { activeStatus = 'all'; query = ''; currentPage = 1; refreshTable(); }
      function findResult(id) {
        for (const m of chatLog) if (m.results) { const r = m.results.find((x) => x.id === id); if (r) return r; }
        return lastResults.find((x) => x.id === id) || null;
      }
      function addWebResult(id) {
        const r = findResult(id);
        if (!r || addedResults.has(id) || loadingResults.has(id)) return;
        loadingResults.add(id);
        renderChat();
        setTimeout(() => {
          loadingResults.delete(id);
          addedResults.add(id);
          queueFromResult(r);
          showQueued();
          renderChat();
        }, 500);
      }
      function addAllWebResults() {
        const pending = lastResults.filter((r) => !addedResults.has(r.id) && !loadingResults.has(r.id));
        if (!pending.length) return;
        pending.forEach((r) => loadingResults.add(r.id));
        renderChat();
        setTimeout(() => {
          pending.forEach((r) => { loadingResults.delete(r.id); addedResults.add(r.id); queueFromResult(r); });
          showQueued();
          renderChat();
          pushBot(`Added ${pending.length} ${pending.length === 1 ? 'video' : 'videos'} to your downloads.`);
        }, 600);
      }
      function resultsHTML(results) {
        const cards = results.map((r) => {
          const added = addedResults.has(r.id);
          const loading = loadingResults.has(r.id);
          const btn = added
            ? `<span class="chat__add chat__add--done" title="Added">${li('check', 'w-[13px] h-[13px]')}</span>`
            : loading
            ? `<span class="chat__add"><span class="chat__spin"></span></span>`
            : `<button class="chat__add" data-add="${r.id}" title="Add to downloads">${li('download', 'w-[13px] h-[13px]')}</button>`;
          const sc = SOURCES[r.source] || SOURCES.web;
          const thumbInner = r.thumbUrl ? `<span class="chat__thumbbadge">${sc.abbr}</span><span class="chat__thumbplay">${li('play', 'w-[14px] h-[14px]')}</span><img class="chat__thumbimg" src="${r.thumbUrl}" alt="" onerror="this.remove()">` : '';
          return `<div class="chat__card${added ? ' chat__card--added' : ''}"><div class="chat__thumb" style="background:linear-gradient(135deg,${r.thumbColor[0]},${r.thumbColor[1]})">${thumbInner}</div><div class="chat__cardbody"><div class="chat__cardtitle">${esc(r.title)}</div><div class="chat__cardmeta">${esc(r.channel)} · ${r.duration} · <span class="chat__srcdot" style="background:${sc.color}"></span>${sc.name}</div></div>${btn}</div>`;
        }).join('');
        const pending = results.filter((r) => !addedResults.has(r.id)).length;
        const allBtn = pending ? `<div class="chat__row"><button class="chat__chip" data-addall="1">Add all (${pending})</button></div>` : '';
        return `<div class="chat__results">${cards}</div>${allBtn}`;
      }

      /* ---- link detection & preview cards (scalable provider registry) ---- */
      // Add a provider object here to support a new link type (Vimeo, Twitch, …); nothing else changes.
      const LINK_PROVIDERS = [
        {
          id: 'youtube',
          source: 'youtube',
          thumbColor: ['#ff3b30', '#7a1010'],
          match(text) {
            const m = text.match(/(?:youtube\.com\/(?:watch\?(?:[^\s]*&)?v=|shorts\/|embed\/|live\/|v\/)|youtu\.be\/)([\w-]{11})/i);
            if (!m) return null;
            const u = text.match(/https?:\/\/[^\s]+/);
            return { videoId: m[1], url: u ? u[0] : 'https://www.youtube.com/watch?v=' + m[1] };
          },
          thumb(d) { return 'https://img.youtube.com/vi/' + d.videoId + '/mqdefault.jpg'; },
          oembed(d) { return 'https://www.youtube.com/oembed?url=' + encodeURIComponent('https://www.youtube.com/watch?v=' + d.videoId) + '&format=json'; },
        },
      ];
      function detectLink(text) {
        for (const p of LINK_PROVIDERS) { const d = p.match(text); if (d) return { provider: p, data: d }; }
        return null;
      }
      let linkIdCounter = 0;
      const linkCards = {};
      function produceLinkCard(link, rawText) {
        const p = link.provider, d = link.data;
        const sc = SOURCES[p.source] || SOURCES.web;
        const card = {
          id: 'lk' + (++linkIdCounter), source: p.source, videoId: d.videoId, url: d.url,
          title: sc.name + ' video', channel: '', duration: '',
          thumbUrl: p.thumb ? p.thumb(d) : '', thumbColor: p.thumbColor || ['#3b82f6', '#1b2b4d'], status: 'ready',
        };
        linkCards[card.id] = card;
        enrichLink(card, p);
        if (/\b(download|grab|save|fetch|queue)\b/i.test(rawText)) { pushBot('Got it — queuing that ' + sc.name + ' video.', { linkId: card.id }); queueLink(card.id, 'mp4'); }
        else pushBot('That’s a ' + sc.name + ' video — what would you like me to do with it?', { linkId: card.id });
      }
      // Hybrid: try to enrich with real metadata; silently keep the offline mock on any failure (offline / CORS).
      function enrichLink(card, provider) {
        if (!provider.oembed || typeof fetch !== 'function') return;
        try {
          fetch(provider.oembed(card)).then((r) => (r && r.ok ? r.json() : null)).then((j) => {
            if (!j) return;
            if (j.title) card.title = j.title;
            if (j.author_name) card.channel = j.author_name;
            renderChat();
          }).catch(() => {});
        } catch (e) {}
      }
      function linkCardHTML(id) {
        const c = linkCards[id];
        if (!c) return '';
        const sc = SOURCES[c.source] || SOURCES.web;
        const bits = [sc.name];
        if (c.channel) bits.push(esc(c.channel));
        if (c.duration) bits.push(c.duration);
        const meta = '<span class="chat__srcdot" style="background:' + sc.color + '"></span>' + bits.join(' · ');
        const img = c.thumbUrl ? '<img class="chat__thumbimg" src="' + c.thumbUrl + '" alt="" onerror="this.remove()">' : '';
        const thumb = '<div class="chat__thumb" style="background:linear-gradient(135deg,' + c.thumbColor[0] + ',' + c.thumbColor[1] + ')"><span class="chat__thumbbadge">' + sc.abbr + '</span><span class="chat__thumbplay">' + li('play', 'w-4 h-4') + '</span>' + img + '</div>';
        let actions;
        if (c.status === 'queued') actions = '<div class="chat__linkactions"><span class="chat__linkdone">' + li('check', 'w-[13px] h-[13px]') + 'Added to your downloads</span></div>';
        else if (c.status === 'queuing') actions = '<div class="chat__linkactions"><span class="chat__add"><span class="chat__spin"></span></span></div>';
        else actions = '<div class="chat__linkactions"><button class="chat__cta chat__cta--go" data-link-dl="' + id + '">Download</button><button class="chat__cta chat__cta--no" data-link-audio="' + id + '">Audio only</button><button class="chat__cta chat__cta--no" data-link-copy="' + id + '">Copy link</button></div>';
        return '<div class="chat__card chat__linkcard">' + thumb + '<div class="chat__cardbody"><div class="chat__cardtitle">' + esc(c.title) + '</div><div class="chat__cardmeta">' + meta + '</div></div></div>' + actions;
      }
      function queueLink(id, format) {
        const c = linkCards[id];
        if (!c || c.status !== 'ready') return;
        c.status = 'queuing';
        renderChat();
        setTimeout(() => {
          c.status = 'queued';
          queueFromResult({ title: c.title, channel: c.channel, thumbColor: c.thumbColor, source: c.source }, format);
          showQueued();
          renderChat();
          pushBot('Added to your downloads' + (format === 'm4a' ? ' (audio only)' : '') + ' — fetching now.');

      }
      function copyLink(id) {
        const c = linkCards[id];
        if (!c) return;
        if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(c.url).then(() => pushBot('Copied the link to your clipboard.')).catch(() => pushBot('Here’s the link: ' + c.url));
        else pushBot('Here’s the link: ' + c.url);
      }

      function handle(raw) {
        const text = (raw || '').trim();
        if (!text) return;
        pushUser(text);
        if (pendingConfirm) {
          if (/^(y|yes|yep|confirm|ok|okay|sure|do it|go)\b/i.test(text)) { runActivity(['apply_action'], () => confirmPending(true)); return; }
          if (/^(n|no|nope|cancel|nvm|never|stop)\b/i.test(text)) { runActivity(['cancel_action'], () => confirmPending(false)); return; }
          runActivity(['await_confirmation'], () => pushBot('Please choose Confirm or Cancel for the pending action.', { confirm: true }));
          return;
        }
        const link = detectLink(text);
        if (link) { runActivity(['parse_link', 'fetch_metadata'], () => produceLinkCard(link, text)); return; }
        const res = interpret(text);
        runActivity(planSteps(text, res), () => produceResponse(res));
      }
      function produceResponse(res) {
        if (res.web !== undefined) { showWebResults(res.web); return; }
        if (res.confirm) { pendingConfirm = { run: res.run }; setConfirmUI(true); pushBot(res.reply, { confirm: true }); return; }
        if (res.run) { pushBot(res.run(), { chips: res.chips }); return; }
        pushBot(res.reply, { chips: res.chips });
      }
      function showWebResults(q) {
        const results = webSearch(q);
        lastResults = results;
        if (!results.length) pushBot(`No web results for “${q}”. Try a different search.`);
        else pushBot(`Here are web results for “${q}” — tap + to queue one, or “Add all”.`, { results });
      }
      function planSteps(text, res) {
        const t = (text || '').toLowerCase();
        if (res.web !== undefined) return ['search_web ' + JSON.stringify(res.web || ''), 'fetch_results'];
        if (/\b(delete|remove|clear|trash|discard)\b/.test(t)) return ['resolve_targets', 'prepare_delete'];
        if (/\b(deselect|unselect|uncheck)\b/.test(t)) return ['match_items', 'update_selection'];
        if (/\b(select|check)\b/.test(t)) return ['match_items', 'update_selection'];
        if (/\b(favorite|favourite|like|heart|unfavorite)\b/.test(t)) return ['match_items', 'update_favorites'];
        if (/\b(start|resume|pause|stop|begin|download)\b/.test(t)) return ['resolve_targets', 'update_state'];
        if (/\b(expand|collapse)\b/.test(t)) return ['toggle_group'];
        if (/\b(how many|count|number of|total)\b/.test(t)) return ['count_items'];
        if (/\bundo\b/.test(t)) return ['restore_snapshot'];
        if (/\b(next|previous|prev)\b.*page|\bpage\b/.test(t)) return ['paginate'];
        if (/\b(plugin|subscription|article|tab)s?\b/.test(t)) return ['switch_view'];
        if (/\b(search|find|look for)\b/.test(t)) return ['parse_query', 'apply_filter'];
        if (/\b(show|filter|view|only|display|list|go to|failed|finished|queued|paused|downloading|active|favorites)\b/.test(t)) return ['resolve_filter', 'apply_filter'];
        if (/\b(help|what can you|capabilities)\b/.test(t)) return ['list_capabilities'];
        return ['interpret_command'];
      }
      function runActivity(cmds, produce) {
        const steps = (cmds && cmds.length ? cmds : ['interpret_command']).map((c) => ({ cmd: c, status: 'run' }));
        const msg = { role: 'bot', activity: true, steps, collapsed: false, done: false };
        chatLog.push(msg);
        renderChat();
        let i = 0;
        const per = Math.max(170, Math.min(300, Math.round(650 / steps.length)));
        const tick = () => {
          if (i < steps.length) { steps[i].status = 'done'; i++; renderChat(); setTimeout(tick, per); }
          else { msg.done = true; msg.collapsed = true; renderChat(); produce(); }
        };
        setTimeout(tick, per);
      }
      function autoGrow(el) {
        if (!el) return;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      }
      function sendFromInput() {
        const i = chatDoc.getElementById('chatinput');
        if (!i) return;
        const v = i.value;
        i.value = '';
        i.style.height = 'auto';
        const cs = chatDoc.getElementById('chatsend'); if (cs) cs.disabled = true;
        handle(v);
      }
      function toggleChat(force) {
        const panel = document.getElementById('chat');
        if (!panel) return;
        if (detached || floating) { redockChat(); return; }
        const open = typeof force === 'boolean' ? force : !panel.classList.contains('is-open');
        const tgl = document.getElementById('chatToggle');
        if (tgl) tgl.setAttribute('aria-pressed', String(open));
        const tw = document.getElementById('tablewrap');
        if (open) {
          panel.style.display = 'flex';
          void panel.offsetWidth; // flush layout so the width transition runs from 0
          panel.classList.add('is-open');
          if (tw) tw.classList.add('compact'); // collapse table to essentials so it fits without scroll
          renderChat();
          setTimeout(() => { const i = chatDoc.getElementById('chatinput'); if (i) i.focus(); }, 60);
        } else {
          panel.classList.remove('is-open');
          const done = (e) => {
            if (e && e.propertyName !== 'width') return;
            if (!panel.classList.contains('is-open')) { panel.style.display = 'none'; if (tw) tw.classList.remove('compact'); }
            panel.removeEventListener('transitionend', done);
          };
          panel.addEventListener('transitionend', done);
        }
      }

      /* ---- detach the chat into a floating, movable window ----
         One source of truth: we MOVE the existing .chat__inner element (never copy it),
         so the floating chat drives the same app state and stays in sync automatically. */
      function setupFloatDoc(win) {
        const d = win.document;
        try { d.title = 'Assistant — Downlodr'; } catch (e) {}
        const s = d.createElement('style');
        s.textContent = Array.prototype.map.call(document.querySelectorAll('style'), (st) => st.textContent).join('\n') +
          '\nhtml,body{margin:0;height:100%;background:#fff;-webkit-font-smoothing:antialiased}';
        d.head.appendChild(s);
      }
      async function detachChat() {
        if (detached || floating) return;
        const dock = document.getElementById('chat');
        chatInner = dock.querySelector('.chat__inner');
        if (!chatInner) return;
        let win = null;
        if ('documentPictureInPicture' in window) {
          try { win = await window.documentPictureInPicture.requestWindow({ width: 384, height: 600 }); } catch (e) { win = null; }
        }
        if (!win) win = window.open('', 'dl-assistant', 'popup=yes,width=384,height=620');
        if (!win) { pushBot('I couldn’t open a floating window — it may have been blocked by the browser.'); return; }
        floatWin = win;
        detached = true;
        setupFloatDoc(win);
        win.document.body.appendChild(chatInner); // relocate (adopts node + keeps its listeners)
        chatInner.classList.add('chat__inner--float');
        chatDoc = win.document;
        renderChat();
        setTimeout(() => { const i = chatDoc.getElementById('chatinput'); if (i) i.focus(); }, 60);
        win.addEventListener('pagehide', redockChat, { once: true });
        collapseDock();
      }
      function collapseDock() {
        const dock = document.getElementById('chat');
        const tw = document.getElementById('tablewrap');
        const tgl = document.getElementById('chatToggle');
        dock.classList.remove('is-open');
        if (tgl) { tgl.classList.remove('is-hidden'); tgl.setAttribute('aria-pressed', 'false'); }
        setTimeout(() => { if (detached || floating) { dock.style.display = 'none'; if (tw) tw.classList.remove('compact'); } }, 260);
      }
      function redockChat() {
        if (!detached && !floating) return;
        const dock = document.getElementById('chat');
        if (chatInner) { chatInner.classList.remove('chat__inner--float', 'chat__inner--panel'); dock.appendChild(chatInner); }
        chatDoc = document;
        if (detached) { const w = floatWin; floatWin = null; if (w && !w.closed) { try { w.close(); } catch (e) {} } }
        if (floating && floatEl) { floatEl.remove(); floatEl = null; }
        detached = false;
        floating = false;
        // restore the docked, open panel and re-compact the table
        dock.style.display = 'flex';
        void dock.offsetWidth;
        dock.classList.add('is-open');
        const tw = document.getElementById('tablewrap'); if (tw) tw.classList.add('compact');
        const tgl = document.getElementById('chatToggle'); if (tgl) { tgl.classList.add('is-hidden'); tgl.setAttribute('aria-pressed', 'true'); }
        renderChat();
      }
      function floatChatInApp() {
        if (detached || floating) return;
        const dock = document.getElementById('chat');
        chatInner = dock.querySelector('.chat__inner');
        if (!chatInner) return;
        floating = true;
        floatEl = document.createElement('div');
        floatEl.className = 'chat-float';
        document.body.appendChild(floatEl);
        floatEl.appendChild(chatInner);
        chatInner.classList.add('chat__inner--panel');
        chatDoc = document;
        makeFloatDraggable();
        renderChat();
        collapseDock();
        setTimeout(() => { const i = chatDoc.getElementById('chatinput'); if (i) i.focus(); }, 60);
      }
      function makeFloatDraggable() {
        const head = chatInner.querySelector('.chat__head');
        if (!head || head.dataset.dragBound) return;
        head.dataset.dragBound = '1';
        let sx = 0, sy = 0, sl = 0, st = 0, dragging = false;
        const move = (ev) => {
          if (!dragging || !floatEl) return;
          let nl = sl + (ev.clientX - sx), nt = st + (ev.clientY - sy);
          nl = Math.max(8, Math.min(nl, window.innerWidth - floatEl.offsetWidth - 8));
          nt = Math.max(8, Math.min(nt, window.innerHeight - floatEl.offsetHeight - 8));
          floatEl.style.left = nl + 'px';
          floatEl.style.top = nt + 'px';
        };
        const up = () => { dragging = false; document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
        head.addEventListener('mousedown', (e) => {
          if (!floating || !floatEl || e.target.closest('button')) return;
          const r = floatEl.getBoundingClientRect();
          sx = e.clientX; sy = e.clientY; sl = r.left; st = r.top;
          floatEl.style.right = 'auto'; floatEl.style.left = sl + 'px'; floatEl.style.top = st + 'px';
          dragging = true;
          document.addEventListener('mousemove', move);
          document.addEventListener('mouseup', up);
          e.preventDefault();
        });
      }

      const chatPanel = () =>
        `<aside id="chat" class="chat" style="display:none" aria-label="Assistant">
          <div class="chat__inner">
          <div class="chat__head">
            <span class="text-orange">${li('sparkles', 'w-[18px] h-[18px]')}</span>
            <div class="min-w-0 flex-1"><div class="chat__title">Assistant</div><div class="chat__sub">Search, filter, select, delete…</div></div>
            <button id="chatFloatBtn" type="button" class="flex h-7 w-7 items-center justify-center rounded-md text-ink-400 transition-colors hover:bg-mono-100 hover:text-ink-700" title="Float as a draggable panel">${li('pip', 'w-[15px] h-[15px]')}</button>
            <button id="chatClear" type="button" class="flex h-7 w-7 items-center justify-center rounded-md text-ink-400 transition-colors hover:bg-mono-100 hover:text-ink-700" title="Clear conversation">${li('trash-2', 'w-[15px] h-[15px]')}</button>
            <button id="chatClose" type="button" class="flex h-7 w-7 items-center justify-center rounded-md text-ink-400 transition-colors hover:bg-mono-100 hover:text-ink-700" title="Close">${li('x', 'w-[15px] h-[15px]')}</button>
          </div>
          <div id="chatlog" class="chat__log" role="log" aria-live="polite" aria-relevant="additions"></div>
          <div id="chatfoot" class="chat__foot">
            <div class="chat__inputwrap">
              <textarea id="chatinput" class="chat__input" rows="1" placeholder="Message the assistant…" autocomplete="off" aria-label="Message the assistant"></textarea>
              <button id="chatsend" type="button" class="chat__send" title="Send" aria-label="Send">${li('send', 'w-[15px] h-[15px]')}</button>
            </div>
          </div>
          </div>
        </aside>`;

      /* ---------- mount ---------- */
      function render() {
        document.getElementById('root').innerHTML = `
          <div class="flex h-full items-center justify-center bg-mono-200 p-4">
            <div class="flex h-full max-h-[860px] w-full max-w-[1328px] flex-col overflow-hidden rounded-xl border border-stroke shadow-2xl">
              ${header()}
              <div class="flex min-h-0 flex-1 gap-2 bg-mono-100 p-2">
                ${sidebar()}
                <main class="flex min-w-0 flex-1 flex-col gap-2">
                  ${toolbar()}
                  <div class="flex min-h-0 flex-1 flex-col overflow-hidden rounded-lg bg-white shadow-sm">
                    <div class="flex-1 overflow-auto"><div id="tablewrap" class="dt-wrap">${tableHeader()}<div id="tbody">${buildTableBody()}</div></div></div>
                    ${pagination()}
                  </div>
                  ${statusBar()}
                </main>
                ${chatPanel()}
              </div>
            </div>
          </div>`;
        wire();
      }

      function refreshTable() {
        const tb = document.getElementById('tbody');
        if (tb) tb.innerHTML = buildTableBody();
        updateChrome();
      }

      function wire() {
        // Expand / collapse + checkboxes (table)
        document.getElementById('tbody').addEventListener('click', (e) => {
          const t = e.target.closest('[data-toggle]');
          if (t) { const id = t.dataset.toggle; expanded.has(id) ? expanded.delete(id) : expanded.add(id); refreshTable(); return; }
          const f = e.target.closest('[data-fav]');
          if (f) { const id = f.dataset.fav; favorites.has(id) ? favorites.delete(id) : favorites.add(id); refreshTable(); return; }
          const c = e.target.closest('[data-check]');
          if (c) { const id = c.dataset.check; checked.has(id) ? checked.delete(id) : checked.add(id); refreshTable(); }
        });

        // Hover tooltip — compact info panel that follows the cursor (fixed, never clipped/obstructing)
        const tbodyEl = document.getElementById('tbody');
        const tip = document.createElement('div');
        tip.className = 'rowtip';
        document.body.appendChild(tip);
        let tipId = null;
        tbodyEl.addEventListener('mousemove', (e) => {
          const row = e.target.closest('[data-tip]');
          if (!row) { tip.style.display = 'none'; tipId = null; return; }
          if (row.dataset.tip !== tipId) { tip.innerHTML = buildTip(row.dataset.tip); tipId = row.dataset.tip; }
          tip.style.display = 'block';
          const r = tip.getBoundingClientRect();
          let left = e.clientX + 16;
          let top = e.clientY + 16;
          if (left + r.width + 14 > window.innerWidth) left = e.clientX - r.width - 16;
          if (top + r.height + 14 > window.innerHeight) top = e.clientY - r.height - 16;
          tip.style.left = Math.max(8, left) + 'px';
          tip.style.top = Math.max(8, top) + 'px';
        });
        tbodyEl.addEventListener('mouseleave', () => { tip.style.display = 'none'; tipId = null; });

        // Sidebar status selection
        const aside = document.getElementById('sidebar');
        aside.addEventListener('click', (e) => {
          const b = e.target.closest('[data-status]');
          if (!b) return;
          actions.filter(b.dataset.status);
        });

        // Header tabs
        const tabbar = document.getElementById('tabbar');
        tabbar.addEventListener('click', (e) => {
          const b = e.target.closest('[data-tab]');
          if (!b) return;
          actions.tab(b.dataset.tab);
        });

        // Search input
        const si = document.querySelector('.sbar__in');
        if (si) si.addEventListener('input', (e) => { query = e.target.value; currentPage = 1; refreshTable(); });

        // Pagination
        document.querySelectorAll('[data-page]').forEach((b) =>
          b.addEventListener('click', () => (b.dataset.page === 'next' ? actions.nextPage() : actions.prevPage())));

        // Assistant (docked chat panel)
        const ct = document.getElementById('chatToggle'); if (ct) ct.addEventListener('click', () => toggleChat());
        const cf = document.getElementById('chatFloatBtn'); if (cf) cf.addEventListener('click', floatChatInApp);
        const cc = document.getElementById('chatClose'); if (cc) cc.addEventListener('click', () => ((detached || floating) ? redockChat() : toggleChat(false)));
        const cClr = document.getElementById('chatClear'); if (cClr) cClr.addEventListener('click', clearChat);
        const dockEl = document.getElementById('chat');
        if (dockEl) dockEl.addEventListener('click', (e) => { if (e.target.closest('#chatReturn')) redockChat(); });
        const cs = document.getElementById('chatsend'); if (cs) cs.addEventListener('click', sendFromInput);
        const ci = chatDoc.getElementById('chatinput');
        if (ci) {
          ci.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromInput(); } });
          ci.addEventListener('input', () => { if (cs) cs.disabled = !ci.value.trim(); autoGrow(ci); });
          if (cs) cs.disabled = true;
        }
        const cl = chatDoc.getElementById('chatlog');
        if (cl) cl.addEventListener('click', (e) => {
          const at = e.target.closest('[data-acttoggle]'); if (at) { const m = chatLog[+at.dataset.acttoggle]; if (m) { m.collapsed = !m.collapsed; renderChat(); } return; }
          const add = e.target.closest('[data-add]'); if (add) { addWebResult(add.dataset.add); return; }
          const addall = e.target.closest('[data-addall]'); if (addall) { addAllWebResults(); return; }
          const ldl = e.target.closest('[data-link-dl]'); if (ldl) { queueLink(ldl.dataset.linkDl, 'mp4'); return; }
          const lau = e.target.closest('[data-link-audio]'); if (lau) { queueLink(lau.dataset.linkAudio, 'm4a'); return; }
          const lcp = e.target.closest('[data-link-copy]'); if (lcp) { copyLink(lcp.dataset.linkCopy); return; }
          const chip = e.target.closest('[data-chip]'); if (chip) { handle(chip.dataset.chip); return; }
          const act = e.target.closest('[data-act]'); if (act) confirmPending(act.dataset.act === 'go');
        });
      }

      render();
    </script>
  </body>
</html>
